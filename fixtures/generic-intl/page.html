<!doctype html>
<html>
<head><title>Data Analyst at Globex - Careers</title></head>
<body>
<main>
  <h1>Apply for Data Analyst</h1>
  <form action="#" method="post">
    <h2>Contact details</h2>
    <div class="row">
      <label for="fn">First name *</label>
      <input id="fn" autocomplete="given-name" required />
    </div>
    <div class="row">
      <label for="ln">Last name *</label>
      <input id="ln" autocomplete="family-name" required />
    </div>
    <div class="row">
      <label for="em">Email *</label>
      <input id="em" type="email" autocomplete="email" required />
    </div>
    <div class="row">
      <label for="cc">Country code</label>
      <select id="cc">
        <option value="">Select</option>
        <option value="1">United States (+1)</option>
        <option value="44">United Kingdom (+44)</option>
        <option value="27">South Africa (+27)</option>
        <option value="91">India (+91)</option>
      </select>
    </div>
    <div class="row">
      <label for="ph">Phone number</label>
      <input id="ph" type="tel" />
    </div>

    <h2>Address</h2>
    <div class="row">
      <label for="al1">Address line 1</label>
      <input id="al1" autocomplete="address-line1" />
    </div>
    <div class="row">
      <label for="ct">City</label>
      <input id="ct" />
    </div>
    <div class="row">
      <label for="st">State / Province</label>
      <input id="st" />
    </div>
    <div class="row">
      <label for="pc">Postal code</label>
      <input id="pc" autocomplete="postal-code" />
    </div>
    <div class="row">
      <label for="cn">Country *</label>
      <select id="cn" required>
        <option value="">Please select</option>
        <option value="DE">Germany (DE)</option>
        <option value="GB">United Kingdom (UK)</option>
        <option value="US">United States of America (US)</option>
        <option value="ZA">South Africa (ZA)</option>
      </select>
    </div>

    <h2>Work eligibility</h2>
    <div class="row">
      <label for="wa">Are you legally authorised to work in the UK? *</label>
      <select id="wa">
        <option value=""></option>
        <option value="y">Yes</option>
        <option value="n">No</option>
      </select>
    </div>
    <div class="row">
      <label for="cv2">Resume/CV</label>
      <input id="cv2" type="file" accept=".pdf,.doc,.docx" />
    </div>
    <button type="submit">Apply now</button>
  </form>
</main>
</body>
</html>
