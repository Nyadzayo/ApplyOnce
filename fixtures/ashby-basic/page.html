<!doctype html>
<html>
<head><title>Product Engineer — Acme (Ashby)</title></head>
<body>
<div class="ashby-application">
  <h2>Application</h2>
  <form>
    <div class="ashby-application-form-field-entry">
      <label for="_systemfield_name">Name *</label>
      <input id="_systemfield_name" aria-required="true" />
    </div>
    <div class="ashby-application-form-field-entry">
      <label for="_systemfield_email">Email *</label>
      <input id="_systemfield_email" aria-required="true" />
    </div>
    <div class="ashby-application-form-field-entry">
      <label for="_systemfield_phone">Phone</label>
      <input id="_systemfield_phone" />
    </div>
    <div class="ashby-application-form-field-entry">
      <label for="_systemfield_location">Location</label>
      <input id="_systemfield_location" role="combobox" aria-expanded="false" aria-autocomplete="list" />
    </div>
    <div class="ashby-application-form-field-entry">
      <label for="_systemfield_resume">Resume *</label>
      <input id="_systemfield_resume" type="file" accept=".pdf,.doc,.docx,.odt,.rtf,.txt" />
    </div>
    <div class="ashby-application-form-field-entry">
      <label for="f9e8d7c6">Do you require visa sponsorship to work in the United States? *</label>
      <input id="f9e8d7c6" role="combobox" aria-expanded="false" aria-controls="f9e8d7c6-listbox" />
      <div id="f9e8d7c6-listbox" role="listbox">
        <div role="option" data-value="yes">Yes</div>
        <div role="option" data-value="no">No</div>
      </div>
    </div>
    <div class="ashby-application-form-field-entry">
      <label for="a1b2c3d4">What is your notice period?</label>
      <input id="a1b2c3d4" />
    </div>
    <button type="submit">Submit Application</button>
  </form>
</div>
</body>
</html>
